name: DanielOS Android Build

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]
    paths:
      - "DanielOS/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "DanielOS/**"
      - ".github/workflows/android-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DanielOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        run: sh ./gradlew :app:assembleDebug --stacktrace

      - name: Build Release AAB (unsigned)
        run: sh ./gradlew :app:bundleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: danielos-debug-apk
          path: DanielOS/app/build/outputs/apk/debug/*.apk

      - name: Upload Release AAB (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: danielos-release-aab-unsigned
          path: DanielOS/app/build/outputs/bundle/release/*.aab
